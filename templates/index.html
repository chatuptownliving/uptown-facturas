<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uptown — Gestión de Facturas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #242424;
  --surface: #2e2e2e;
  --surface2: #393939;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.14);
  --text: #efefef;
  --muted: #a09080;
  --accent: #e18f00;
  --accent2: #f5a623;
  --danger: #f07070;
  --info: #85B7EB;
  --purple: #c4b89a;
  --font-head: 'Barlow Condensed', sans-serif;
  --font-body: 'Barlow', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --r: 8px;
  --r-lg: 14px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── LAYOUT ── */
.layout { display: flex; min-height: 100vh; }

.sidebar {
  width: 220px;
  min-width: 220px;
  background: #1e1e1e;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 0;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
}

.sidebar-logo {
  padding: 22px 20px 18px;
  border-bottom: 2px solid var(--accent);
}

.logo-mark {
  font-family: var(--font-head);
  font-size: 20px;
  font-weight: 800;
  color: var(--accent);
  letter-spacing: 0.06em;
  line-height: 1;
}

.logo-sub {
  font-size: 9px;
  color: var(--muted);
  font-family: var(--font-mono);
  letter-spacing: 0.1em;
  margin-top: 2px;
}

.sidebar-nav {
  flex: 1;
  padding: 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.nav-section {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.08em;
  padding: 12px 8px 6px;
  text-transform: uppercase;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: var(--r);
  cursor: pointer;
  font-size: 13.5px;
  color: var(--muted);
  transition: all 0.15s;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}

.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: rgba(225,143,0,0.12); color: var(--accent); border-left: 2px solid var(--accent); padding-left: 10px; }
.nav-item .icon { font-size: 16px; opacity: 0.8; }

.sidebar-footer {
  padding: 16px 12px;
  border-top: 1px solid var(--border);
}

.user-chip {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  background: var(--surface2);
  border-radius: var(--r);
}

.user-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, #e18f00, #f5a623);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-head);
  font-size: 11px;
  font-weight: 700;
  color: #1a0e00;
  flex-shrink: 0;
}

.user-name { font-size: 12.5px; font-weight: 500; }
.user-role { font-size: 10px; color: var(--muted); font-family: var(--font-mono); }

.main { margin-left: 220px; flex: 1; display: flex; flex-direction: column; }

.topbar {
  background: #1e1e1e;
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}

.page-title {
  font-family: var(--font-head);
  font-size: 22px;
  font-weight: 800;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.topbar-actions { display: flex; align-items: center; gap: 10px; }

.content { padding: 24px 28px; flex: 1; }

/* ── TABS ── */
.tabs {
  display: flex;
  gap: 2px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 3px;
  width: fit-content;
  margin-bottom: 24px;
}

.tab {
  padding: 7px 16px;
  border-radius: 8px;
  border: none;
  background: none;
  color: var(--muted);
  font-size: 13px;
  font-family: var(--font-body);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.tab.active { background: var(--surface2); color: var(--text); }
.tab:hover:not(.active) { color: var(--text); }

/* ── CARDS ── */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s;
}
.stat-card:hover { border-color: rgba(225,143,0,0.3); }

.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--accent-card, var(--accent));
  border-radius: 0;
}

.stat-label {
  font-size: 10px;
  color: var(--muted);
  font-family: var(--font-head);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 600;
  margin-bottom: 8px;
}

.stat-value {
  font-family: var(--font-head);
  font-size: 26px;
  font-weight: 800;
  line-height: 1;
  margin-bottom: 4px;
  letter-spacing: -0.01em;
}

.stat-sub {
  font-size: 11px;
  color: var(--muted);
}

/* ── BUTTONS ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 8px 16px;
  border-radius: var(--r);
  border: none;
  font-size: 13px;
  font-family: var(--font-body);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.btn-primary {
  background: var(--accent);
  color: #1a0e00;
  font-weight: 600;
  font-family: var(--font-head);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  font-size: 12px;
}
.btn-primary:hover { background: #f5a623; transform: translateY(-1px); }

.btn-secondary {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border2);
}
.btn-secondary:hover { background: var(--surface); border-color: var(--accent); color: var(--accent); }

.btn-ghost {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
}
.btn-ghost:hover { color: var(--text); border-color: var(--border2); }

.btn-danger {
  background: rgba(240,149,149,0.1);
  color: var(--danger);
  border: 1px solid rgba(240,149,149,0.2);
}
.btn-danger:hover { background: rgba(240,149,149,0.2); }

.btn-sm { padding: 5px 11px; font-size: 12px; }
.btn-icon { padding: 7px; border-radius: 8px; }

/* ── TABLE ── */
.table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
}

.table-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  gap: 12px;
}

.table-header-left { display: flex; align-items: center; gap: 12px; flex: 1; }

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  padding: 11px 14px;
  text-align: left;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
  white-space: nowrap;
}

td {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  vertical-align: middle;
}

tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.015); }

.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 9px;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 500;
  font-family: var(--font-mono);
  white-space: nowrap;
}

.badge-ok { background: rgba(225,143,0,0.12); color: #e18f00; border: 1px solid rgba(225,143,0,0.25); }
.badge-warn { background: rgba(239,159,39,0.12); color: #EF9F27; border: 1px solid rgba(239,159,39,0.2); }
.badge-danger { background: rgba(240,149,149,0.12); color: #F09595; border: 1px solid rgba(240,149,149,0.2); }
.badge-info { background: rgba(133,183,235,0.12); color: #85B7EB; border: 1px solid rgba(133,183,235,0.2); }
.badge-purple { background: rgba(175,169,236,0.12); color: #AFA9EC; border: 1px solid rgba(175,169,236,0.2); }

/* ── SEARCH & FILTERS ── */
.search-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 0 12px;
  flex: 1;
  max-width: 360px;
  transition: border-color 0.15s;
}

.search-bar:focus-within { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(225,143,0,0.15); }

.search-bar input {
  border: none;
  background: none;
  color: var(--text);
  font-size: 13px;
  font-family: var(--font-body);
  padding: 9px 4px;
  flex: 1;
  outline: none;
}

.search-bar input::placeholder { color: var(--muted); }

.filters {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}

select, .select {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  color: var(--text);
  font-size: 13px;
  font-family: var(--font-body);
  padding: 7px 10px;
  outline: none;
  cursor: pointer;
  transition: border-color 0.15s;
}

select:focus { border-color: var(--accent); }

/* ── UPLOAD ZONE ── */
.upload-zone {
  border: 1.5px dashed var(--border2);
  border-radius: var(--r-lg);
  padding: 32px;
  text-align: center;
  background: var(--surface);
  cursor: pointer;
  transition: all 0.2s;
}

.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--accent);
  background: rgba(225,143,0,0.05);
}

.upload-icon {
  font-size: 36px;
  margin-bottom: 10px;
  opacity: 0.5;
}

.upload-title { font-family: var(--font-head); font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.upload-sub { color: var(--muted); font-size: 12px; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r-lg);
  padding: 28px;
  width: 580px;
  max-width: 95vw;
  max-height: 90vh;
  overflow-y: auto;
  transform: translateY(16px);
  transition: transform 0.2s;
}

.modal-overlay.open .modal { transform: translateY(0); }

.modal-title {
  font-family: var(--font-head);
  font-size: 17px;
  font-weight: 600;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-full { grid-column: 1/-1; }

.form-group { display: flex; flex-direction: column; gap: 5px; }

.form-label {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
}

.form-input {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  color: var(--text);
  font-size: 13px;
  font-family: var(--font-body);
  padding: 9px 12px;
  outline: none;
  transition: border-color 0.15s;
  width: 100%;
}

.form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(225,143,0,0.15); }

/* ── NOTIFICATIONS ── */
.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 2000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 12px 16px;
  font-size: 13px;
  min-width: 260px;
  display: flex;
  align-items: center;
  gap: 10px;
  animation: slideUp 0.2s ease;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}

.toast.success { border-left: 3px solid #e18f00; }
.toast.error { border-left: 3px solid var(--danger); }
.toast.info { border-left: 3px solid var(--info); }
.toast.warn { border-left: 3px solid var(--accent2); }

@keyframes slideUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── PROGRESS ── */
.progress-bar {
  height: 3px;
  background: var(--border);
  border-radius: 99px;
  overflow: hidden;
  margin-top: 8px;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #e18f00, #f5a623);
  border-radius: 99px;
  transition: width 0.3s ease;
}

/* ── CONCILIACION DIFF ── */
.diff-pos { color: var(--accent); }
.diff-neg { color: var(--danger); }
.diff-zero { color: var(--muted); }

.empty-state {
  text-align: center;
  padding: 60px 24px;
  color: var(--muted);
}

.empty-state .empty-icon {
  font-size: 40px;
  margin-bottom: 12px;
  opacity: 0.3;
}

.empty-state p { font-size: 14px; }

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.section-title {
  font-family: var(--font-head);
  font-size: 17px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

.text-mono { font-family: var(--font-mono); }
.text-muted { color: var(--muted); }
.text-sm { font-size: 12px; }
.text-xs { font-size: 11px; }

.loading-row td {
  text-align: center;
  padding: 40px;
  color: var(--muted);
}

.spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid var(--border2);
  border-top-color: #e18f00;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.tag {
  display: inline-flex;
  align-items: center;
  padding: 2px 7px;
  border-radius: 5px;
  font-size: 10px;
  font-family: var(--font-mono);
  background: var(--surface2);
  color: var(--muted);
  border: 1px solid var(--border);
}

/* ── Tooltips ── */
.tooltip-wrap { position:relative; display:inline-flex; align-items:center; gap:4px; }
.tooltip-icon { display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;background:rgba(255,255,255,0.1);color:var(--muted);font-size:9px;cursor:help;flex-shrink:0;border:1px solid rgba(255,255,255,0.15);vertical-align:middle; }
.tooltip-icon:hover { background:rgba(225,143,0,0.2);color:var(--accent);border-color:var(--accent); }
.tooltip-box { display:none;position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;font-size:11px;color:var(--text);width:220px;z-index:9999;pointer-events:none;line-height:1.6;box-shadow:0 8px 24px rgba(0,0,0,0.5); }
.tooltip-icon.active .tooltip-box { visibility:visible;opacity:1; }
/* ── Sortable tables ── */
th.sortable { cursor:pointer;user-select:none; }
th.sortable:hover { color:var(--accent); }
th.sortable::after { content:' ⇅';opacity:0.4;font-size:10px; }
th.sort-asc::after { content:' ↑';opacity:1;color:var(--accent); }
th.sort-desc::after { content:' ↓';opacity:1;color:var(--accent); }
/* ── Factura modal ── */
#modal-factura-viewer { display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.8);align-items:center;justify-content:center; }
#modal-factura-viewer.open { display:flex; }
#modal-factura-viewer .modal-inner { background:var(--surface);border-radius:var(--r-lg);width:90vw;max-width:900px;height:90vh;display:flex;flex-direction:column;overflow:hidden; }
#modal-factura-viewer .modal-head { padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0; }
#modal-factura-viewer .modal-body { flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#1a1a1a; }
#modal-factura-viewer iframe { width:100%;height:100%;border:none; }
#modal-factura-viewer img { max-width:100%;max-height:100%;object-fit:contain; }
</style>
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
        <svg width="32" height="36" viewBox="0 0 160 180" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Left thin column -->
          <rect x="8" y="60" width="28" height="90" rx="6" fill="#e18f00"/>
          <!-- Inner small column (middle notch detail) -->
          <rect x="48" y="80" width="20" height="70" rx="5" fill="#e18f00"/>
          <!-- Right large column with rounded top cap -->
          <path d="M86 20 Q86 8 100 8 L136 8 Q150 8 150 22 L150 148 Q150 156 142 156 L94 156 Q86 156 86 148 Z" fill="#e18f00"/>
          <!-- Bottom bridge connecting left to right -->
          <rect x="8" y="130" width="142" height="30" rx="8" fill="#e18f00"/>
          <!-- Cutout to create inner U space -->
          <rect x="36" y="60" width="50" height="72" fill="#1e1e1e"/>
        </svg>
        <div>
          <div class="logo-mark">UPTOWN</div>
          <div class="logo-sub">· Facturas</div>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Principal</div>
      <button class="nav-item active" onclick="setPage('dashboard')">
        <span class="icon">◈</span> Dashboard
      </button>
      <button class="nav-item" onclick="setPage('facturas')">
        <span class="icon">◧</span> Facturas
      </button>
      <button class="nav-item" onclick="setPage('banco')">
        <span class="icon">◫</span> Estado de cuenta
      </button>
      <div class="nav-section">Análisis</div>
      <button class="nav-item" onclick="setPage('conciliacion')">
        <span class="icon">⇄</span> Conciliación
      </button>
      <button class="nav-item" onclick="setPage('msi')">
        <span class="icon">◑</span> MSI
      </button>
      <button class="nav-item" onclick="setPage('cierres')">
        <span class="icon">◫</span> Cierres
      </button>
      <button class="nav-item" onclick="setPage('reportes')">
        <span class="icon">◉</span> Reportes
      </button>
    </nav>
    <div style="padding:0 12px 8px;font-family:var(--font-head);font-size:9px;letter-spacing:0.15em;color:rgba(225,143,0,0.4);text-transform:uppercase;text-align:center">The next generation of builders.</div>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar" id="user-avatar">AD</div>
        <div>
          <div class="user-name" id="user-name-display">Admin</div>
          <div class="user-role">Equipo</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:14px">
        <svg width="22" height="24" viewBox="0 0 160 180" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="8" y="60" width="28" height="90" rx="6" fill="#e18f00"/>
          <rect x="48" y="80" width="20" height="70" rx="5" fill="#e18f00"/>
          <path d="M86 20 Q86 8 100 8 L136 8 Q150 8 150 22 L150 148 Q150 156 142 156 L94 156 Q86 156 86 148 Z" fill="#e18f00"/>
          <rect x="8" y="130" width="142" height="30" rx="8" fill="#e18f00"/>
          <rect x="36" y="60" width="50" height="72" fill="#393939"/>
        </svg>
        <div class="page-title" id="page-title">Dashboard</div>
      </div>
      <div class="topbar-actions">
        <select id="usuario-select" onchange="cambiarUsuario(this.value)" style="max-width:160px">
        </select>
        <span id="drive-status" style="font-size:11px;font-family:var(--font-mono);color:var(--muted)"></span>
        <button class="btn btn-primary btn-sm" onclick="abrirModalFactura()">
          + Nueva factura
        </button>
      </div>
    </header>

    <div class="content" id="content">
      <!-- Contenido dinámico -->
    </div>
  </main>

</div>

<!-- ── MODAL FACTURA ── -->
<div class="modal-overlay" id="modal-factura">
  <div class="modal">
    <div class="modal-title">
      <span>Agregar factura</span>

    </div>

    <!-- TABS MODAL -->
    <div class="tabs" style="margin-bottom:20px">
      <button class="tab active" onclick="switchModalTab('subir')">Subir archivo</button>
      <button class="tab" onclick="switchModalTab('manual')">Manual</button>

    <!-- Subir archivo -->
    <div id="modal-tab-subir">
      <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <div class="upload-icon">⬆</div>
        <div class="upload-title">Arrastra o selecciona archivos</div>
        <div class="upload-sub">XML · PDF · JPG · PNG — Extracción automática con IA</div>
        <input type="file" id="file-input" accept=".xml,.pdf,.jpg,.jpeg,.png" multiple style="display:none" onchange="handleFiles(this.files)">
      </div>
      <div id="upload-progress" style="margin-top:16px;display:none">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span class="text-sm text-muted">Procesando con IA...</span>
          <span class="text-sm text-mono" id="upload-progress-pct">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
      </div>
      <div style="margin-top:14px">
        <label class="form-label">Tipo de factura</label>
        <div style="display:flex;gap:8px;margin-top:6px">
          <button class="btn btn-secondary btn-sm tipo-btn active" data-tipo="emitida" onclick="selectTipo('emitida',this)">Emitida (cobrar)</button>
          <button class="btn btn-ghost btn-sm tipo-btn" data-tipo="recibida" onclick="selectTipo('recibida',this)">Recibida (pagar)</button>
        </div>
      </div>
    </div>

    <!-- Manual -->
    <div id="modal-tab-manual" style="display:none">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Folio</label>
          <input class="form-input" id="m-folio" placeholder="A-001">
        </div>
        <div class="form-group">
          <label class="form-label">Fecha</label>
          <input class="form-input" id="m-fecha" type="date">
        </div>
        <div class="form-group">
          <label class="form-label">RFC Emisor</label>
          <input class="form-input" id="m-rfc-emisor" placeholder="XAXX010101000">
        </div>
        <div class="form-group">
          <label class="form-label">Nombre Emisor</label>
          <input class="form-input" id="m-nombre-emisor" placeholder="Empresa S.A.">
        </div>
        <div class="form-group">
          <label class="form-label">RFC Receptor</label>
          <input class="form-input" id="m-rfc-receptor" placeholder="XAXX010101000">
        </div>
        <div class="form-group">
          <label class="form-label">Nombre Receptor</label>
          <input class="form-input" id="m-nombre-receptor" placeholder="Cliente S.A.">
        </div>
        <div class="form-group">
          <label class="form-label">Subtotal</label>
          <input class="form-input" id="m-subtotal" type="number" placeholder="0.00" oninput="calcTotal()">
        </div>
        <div class="form-group">
          <label class="form-label">IVA</label>
          <input class="form-input" id="m-iva" type="number" placeholder="0.00" oninput="calcTotal()">
        </div>
        <div class="form-group">
          <label class="form-label">Total</label>
          <input class="form-input" id="m-total" type="number" placeholder="0.00">
        </div>
        <div class="form-group">
          <label class="form-label">Tipo</label>
          <select class="form-input" id="m-tipo">
            <option value="emitida">Emitida (cobrar)</option>
            <option value="recibida">Recibida (pagar)</option>
          </select>
        </div>
        <div class="form-group form-full">
          <label class="form-label">Concepto</label>
          <input class="form-input" id="m-concepto" placeholder="Descripción del servicio o producto">
        </div>
      </div>
      <div style="margin-top:16px;display:flex;justify-content:flex-end;gap:8px">
        <button class="btn btn-ghost btn-sm" onclick="cerrarModal('modal-factura')">Cancelar</button>
        <button class="btn btn-primary btn-sm" onclick="guardarManual()">Guardar factura</button>
      </div>
    </div>
  </div>
</div>

<!-- ── MODAL MOVIMIENTO ── -->
<div class="modal-overlay" id="modal-movimiento">
  <div class="modal" style="width:440px">
    <div class="modal-title">
      <span>Agregar movimiento</span>
      <button class="btn btn-ghost btn-icon btn-sm" onclick="cerrarModal('modal-movimiento')">✕</button>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Fecha</label>
        <input class="form-input" id="mov-fecha" type="date">
      </div>
      <div class="form-group">
        <label class="form-label">Tipo</label>
        <select class="form-input" id="mov-tipo">
          <option value="abono">Abono (entrada)</option>
          <option value="cargo">Cargo (salida)</option>
        </select>
      </div>
      <div class="form-group form-full">
        <label class="form-label">Descripción</label>
        <input class="form-input" id="mov-desc" placeholder="Concepto del movimiento">
      </div>
      <div class="form-group">
        <label class="form-label">Monto</label>
        <input class="form-input" id="mov-monto" type="number" placeholder="0.00">
      </div>
      <div class="form-group">
        <label class="form-label">Referencia (opcional)</label>
        <input class="form-input" id="mov-ref" placeholder="Número de ref.">
      </div>
    </div>
    <div style="margin-top:16px;display:flex;justify-content:flex-end;gap:8px">
      <button class="btn btn-ghost btn-sm" onclick="cerrarModal('modal-movimiento')">Cancelar</button>
      <button class="btn btn-primary btn-sm" onclick="guardarMovimiento()">Guardar</button>
    </div>
  </div>
</div>

<!-- TOASTS -->
<div class="toast-container" id="toast-container"></div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────
let state = {
  page: 'dashboard',
  usuarioId: 1,
  usuarioNombre: 'Admin',
  tipoFactura: 'emitida',
  facturas: [],
  movimientos: [],
  resumen: {},
  filtros: { q: '', tipo: '', mes: '', anio: '', estado: '', conciliada: '', tarjeta: '' }
};

const MESES = ['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

// ─── INIT ─────────────────────────────────────────────────────────────────
async function init() {
  await cargarUsuarios();
  setPage('dashboard');
}

async function cargarUsuarios() {
  const res = await fetch('/api/usuarios');
  const usuarios = await res.json();
  const sel = document.getElementById('usuario-select');
  sel.innerHTML = usuarios.map(u => `<option value="${u.id}">${u.nombre}</option>`).join('');
  if (usuarios.length) {
    state.usuarioId = usuarios[0].id;
    state.usuarioNombre = usuarios[0].nombre;
    document.getElementById('user-name-display').textContent = usuarios[0].nombre;
    document.getElementById('user-avatar').textContent = usuarios[0].nombre.slice(0,2).toUpperCase();
  }
}

function cambiarUsuario(id) {
  state.usuarioId = parseInt(id);
  const sel = document.getElementById('usuario-select');
  const opt = sel.options[sel.selectedIndex];
  document.getElementById('user-name-display').textContent = opt.text;
  document.getElementById('user-avatar').textContent = opt.text.slice(0,2).toUpperCase();
  renderPage();
}

// ─── ROUTING ──────────────────────────────────────────────────────────────
function setPage(page) {
  state.page = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const idx = ['dashboard','facturas','banco','conciliacion','msi','cierres','reportes'].indexOf(page);
  document.querySelectorAll('.nav-item')[idx]?.classList.add('active');
  const titles = { dashboard: 'Dashboard', facturas: 'Facturas', banco: 'Estado de Cuenta', conciliacion: 'Conciliación', msi: 'Compras a Meses', cierres: 'Cierres Mensuales', cierre_detalle: 'Detalle del Cierre', reportes: 'Reportes' };
  document.getElementById('page-title').textContent = titles[page] || page;
  renderPage();
}

async function renderPage() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="empty-state"><span class="spinner"></span></div>';
  switch(state.page) {
    case 'dashboard': await renderDashboard(); break;
    case 'facturas': await renderFacturas(); break;
    case 'banco': await renderBanco(); break;
    case 'conciliacion': await renderConciliacion(); break;
    case 'msi': await renderMSI(); break;
    case 'cierres': await renderCierres(); break;
    case 'cierre_detalle': await renderCierreDetalle(state.cierreId); break;
    case 'reportes': await renderReportes(); break;
  }
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────
async function renderDashboard() {
  const res = await fetch(`/api/conciliacion/resumen?usuario_id=${state.usuarioId}`);
  const r = await res.json();
  const content = document.getElementById('content');

  // Fetch tarjetas, movimientos y MSI en paralelo
  const [resTarjetas, resBanco, resMSI] = await Promise.all([
    fetch(`/api/dashboard/tarjetas?usuario_id=${state.usuarioId}`),
    fetch(`/api/movimientos?usuario_id=${state.usuarioId}`),
    fetch(`/api/msi/resumen?usuario_id=${state.usuarioId}`)
  ]);
  const tarjetas = await resTarjetas.json();
  const movimientos = await resBanco.json();
  const msiResumen = await resMSI.json();
  const movRecientes = movimientos.slice(0,5);

  // Movimientos sin factura
  const resSinFac = await fetch(`/api/movimientos/sin-factura?usuario_id=${state.usuarioId}`);
  const sinFac = await resSinFac.json();

  const tarjetaColors = {
    'konfio': '#9B59B6', 'santander': '#E74C3C', 'bbva': '#1565C0',
    'banamex': '#E67E22', 'hsbc': '#27AE60', 'banorte': '#C0392B',
    'desconocida': 'var(--muted)'
  };

  content.innerHTML = `
    <!-- FACTURAS RECIBIDAS -->
    <div style="margin-bottom:6px;font-family:var(--font-head);font-size:11px;letter-spacing:0.1em;color:var(--muted);text-transform:uppercase">Facturas recibidas</div>
    <div class="cards-grid" style="margin-bottom:20px">
      <div class="stat-card" style="--accent-card:var(--accent)">
        <div class="stat-label tooltip-wrap">Total facturas ${tooltip('Número total de facturas recibidas registradas en el sistema')}</div>
        <div class="stat-value">${r.total_facturas || 0}</div>
        <div class="stat-sub">${r.recibidas||0} recibidas · ${r.conciliadas||0} conciliadas</div>
      </div>
      <div class="stat-card" style="--accent-card:var(--danger)">
        <div class="stat-label tooltip-wrap">Por pagar ${tooltip('Facturas recibidas que aún no se han cruzado con un movimiento del estado de cuenta')}</div>
        <div class="stat-value" style="color:var(--danger)">${fmt(r.por_pagar||0)}</div>
        <div class="stat-sub">${r.pendientes||0} facturas pendientes</div>
      </div>
      <div class="stat-card" style="--accent-card:var(--accent)">
        <div class="stat-label tooltip-wrap">Ya pagado ${tooltip('Suma de facturas recibidas que ya tienen un movimiento bancario correspondiente')}</div>
        <div class="stat-value" style="color:var(--accent)">${fmt(r.total_pagado||0)}</div>
        <div class="stat-sub">${r.conciliadas||0} facturas conciliadas</div>
      </div>
    </div>

    <!-- TARJETAS -->
    <div style="margin-bottom:6px;font-family:var(--font-head);font-size:11px;letter-spacing:0.1em;color:var(--muted);text-transform:uppercase">Por tarjeta</div>
    ${tarjetas.length === 0 ? '<div class="empty-state" style="padding:20px;margin-bottom:20px"><p>Sin estados de cuenta aún</p></div>' :
    `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px;margin-bottom:20px">
      ${tarjetas.map(t => {
        const color = tarjetaColors[t.nombre.toLowerCase()] || 'var(--accent)';
        const pct = t.total_movimientos > 0 ? Math.round(t.facturas_con_match/t.total_movimientos*100) : 0;
        return `
        <div class="table-wrap" style="padding:16px;border-top:3px solid ${color}">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
            <div style="font-family:var(--font-head);font-size:16px;font-weight:700;color:${color}">${t.nombre}</div>
            <span class="badge" style="background:${color}22;color:${color};border-color:${color}44">${t.total_movimientos} movs</span>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px">
            <div>
              <div style="color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:0.06em">${tooltip('Suma de todos los cargos de esta tarjeta')}&nbsp;Total gastado</div>
              <div style="font-family:var(--font-head);font-size:18px;font-weight:700;color:var(--danger)">${fmt(t.total_cargos)}</div>
            </div>
            <div>
              <div style="color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:0.06em">${tooltip('Compras diferidas a meses sin intereses')}&nbsp;A meses (MSI)</div>
              <div style="font-family:var(--font-head);font-size:18px;font-weight:700;color:var(--accent2)">${fmt(t.monto_msi)}</div>
            </div>
          </div>
          <div style="margin-top:10px">
            <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:3px">
              <span>Facturas capturadas ${tooltip('Porcentaje de movimientos de esta tarjeta que tienen una factura conciliada')}</span><span>${pct}%</span>
            </div>
            <div style="height:5px;background:var(--surface2);border-radius:99px;overflow:hidden">
              <div style="height:100%;width:${pct}%;background:${color};border-radius:99px"></div>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>`}

    <!-- MSI -->
    ${msiResumen.compras_activas > 0 ? `
    <div style="margin-bottom:6px;font-family:var(--font-head);font-size:11px;letter-spacing:0.1em;color:var(--muted);text-transform:uppercase">Meses sin intereses (MSI)</div>
    <div class="cards-grid" style="margin-bottom:20px">
      <div class="stat-card" style="--accent-card:var(--accent2)">
        <div class="stat-label">Compras activas</div>
        <div class="stat-value">${msiResumen.compras_activas}</div>
        <div class="stat-sub">A meses sin intereses</div>
      </div>
      <div class="stat-card" style="--accent-card:var(--danger)">
        <div class="stat-label">Deuda total MSI</div>
        <div class="stat-value" style="color:var(--danger)">${fmt(msiResumen.total_deuda_msi||0)}</div>
        <div class="stat-sub">Saldo pendiente acumulado</div>
      </div>
      <div class="stat-card" style="--accent-card:var(--accent2)">
        <div class="stat-label">Se cobra este mes</div>
        <div class="stat-value" style="color:var(--accent2)">${fmt(msiResumen.pago_mensual_msi||0)}</div>
        <div class="stat-sub">Suma de mensualidades</div>
      </div>
    </div>` : ''}

    <!-- MOVIMIENTOS SIN FACTURA -->
    <div id="dash-sin-factura" style="margin-bottom:20px"></div>

    <!-- GRID INFERIOR -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div>
        <div class="section-header"><span class="section-title">Facturas recientes</span><button class="btn btn-ghost btn-sm" onclick="setPage('facturas')">Ver todas →</button></div>
        <div id="dash-facturas-recientes"></div>
      </div>
      <div>
        <div class="section-header"><span class="section-title">Movimientos recientes</span><button class="btn btn-ghost btn-sm" onclick="setPage('banco')">Ver todos →</button></div>
        ${movRecientes.length === 0 ? '<div class="empty-state" style="padding:30px"><p>Sin movimientos aún</p></div>' : `
        <div class="table-wrap">
          <table>
            <thead><tr><th>Fecha</th><th>Descripción</th><th>Tarjeta</th><th>Monto</th></tr></thead>
            <tbody>
              ${movRecientes.map(m=>`
                <tr style="opacity:${m.conciliado?'0.6':'1'}">
                  <td class="text-sm text-muted">${m.fecha||'—'}</td>
                  <td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px">${m.descripcion||'—'}</td>
                  <td class="text-xs text-muted">${(m.referencia||'').split('-')[0].trim()}</td>
                  <td class="text-mono" style="color:${m.tipo==='abono'?'var(--accent)':'var(--danger)'};">${fmt(m.monto)}</td>
                  <td>${m.conciliado?'<span style="color:var(--accent);font-size:11px">✓</span>':'<span style="color:var(--danger);font-size:11px">○</span>'}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>`}
      </div>
    </div>
  `;

  const fRes = await fetch(`/api/facturas?usuario_id=${state.usuarioId}`);
  const facturas = (await fRes.json()).slice(0,6);
  document.getElementById('dash-facturas-recientes').innerHTML = renderTablaFacturasMini(facturas);

  // Render bloque sin factura
  const sfEl = document.getElementById('dash-sin-factura');
  if (sfEl && sinFac.total > 0) {
    sfEl.innerHTML = `
      <div style="background:rgba(240,80,80,0.06);border:1px solid rgba(240,80,80,0.25);border-radius:var(--r-lg);padding:16px 20px;margin-bottom:0">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:8px;height:8px;border-radius:50%;background:var(--danger);animation:pulse 2s infinite;flex-shrink:0"></div>
            <div>
              <div style="font-family:var(--font-head);font-size:15px;font-weight:700">${sinFac.total} gastos sin factura</div>
              <div class="text-sm text-muted">Movimientos del estado de cuenta que no tienen factura registrada</div>
            </div>
          </div>
          <div style="text-align:right">
            <div style="font-family:var(--font-head);font-size:22px;font-weight:700;color:var(--danger)">${fmt(sinFac.monto_total)}</div>
            <div class="text-xs text-muted">pendiente de facturar</div>
          </div>
        </div>
        <table id="tabla-sin-fac-dash" style="font-size:12px">
          <thead><tr>
            <th class="sortable" onclick="sortTableById('tabla-sin-fac-dash',0,'text')">Fecha</th>
            <th>Descripción</th>
            <th>Tarjeta</th>
            <th class="sortable" onclick="sortTableById('tabla-sin-fac-dash',3,'num')">Monto</th>
            <th>Tipo</th>
          </tr></thead>
          <tbody>
            ${sinFac.movimientos.slice(0,10).map(m=>`
              <tr>
                <td class="text-muted" style="white-space:nowrap">${m.fecha||'—'}</td>
                <td style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.descripcion}</td>
                <td><span class="tag" style="font-size:10px">${m.tarjeta}</span></td>
                <td class="text-mono" style="color:var(--danger);font-weight:600">${fmt(m.monto)}</td>
                <td>${m.es_msi?'<span class="badge badge-warn" style="font-size:10px">MSI</span>':'<span class="badge" style="font-size:10px;background:var(--surface2)">Contado</span>'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
        ${sinFac.total > 10 ? `<div style="text-align:center;padding:10px 0 0"><button class="btn btn-ghost btn-sm" onclick="setPage('conciliacion')">Ver los ${sinFac.total} gastos sin factura →</button></div>` : ''}
      </div>
    `;
  } else if (sfEl) {
    sfEl.innerHTML = `<div style="padding:12px 16px;background:rgba(0,200,100,0.06);border:1px solid rgba(0,200,100,0.2);border-radius:var(--r);font-size:13px;display:flex;align-items:center;gap:8px"><span style="color:var(--accent)">✓</span> Todos los movimientos del estado de cuenta tienen factura registrada</div>`;
  }
}

function renderTablaFacturasMini(facturas) {
  if (!facturas.length) return '<div class="empty-state" style="padding:30px"><p>Sin facturas aún</p></div>';
  return `
    <div class="table-wrap">
      <table>
        <thead><tr><th>Folio</th><th>Empresa</th><th>Total</th><th>Estado</th></tr></thead>
        <tbody>
          ${facturas.map(f => `
            <tr>
              <td class="text-mono text-sm">${f.folio || '—'}</td>
              <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.tipo==='emitida'?(f.nombre_receptor||'—'):(f.nombre_emisor||'—')}</td>
              <td class="text-mono">${fmt(f.total)}</td>
              <td>${badgeConciliada(f)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

// ─── FACTURAS ─────────────────────────────────────────────────────────────
async function renderFacturas() {
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="table-wrap">
      <div class="table-header">
        <div class="table-header-left">
          <div class="search-bar">
            <span style="color:var(--muted);font-size:16px">⌕</span>
            <input type="text" placeholder="Buscar por folio, empresa, RFC, concepto..." id="search-input" oninput="debounceSearch(this.value)">
          </div>
          <div class="filters">
            <select onchange="filtrar('tipo',this.value)">
              <option value="">Todas</option>
              <option value="emitida">Emitidas</option>
              <option value="recibida">Recibidas</option>
            </select>
            <select onchange="filtrar('mes',this.value)">
              <option value="">Todos los meses</option>

async function cargarYRenderFacturas() {
  const f = state.filtros;
  let url = `/api/facturas?usuario_id=${state.usuarioId}`;
  if (f.q) url += `&q=${encodeURIComponent(f.q)}`;
  if (f.tipo) url += `&tipo=${f.tipo}`;
  if (f.mes) url += `&mes=${f.mes}`;
  if (f.anio) url += `&anio=${f.anio}`;
  if (f.estado) url += `&estado=${f.estado}`;
  if (f.tarjeta) url += `&tarjeta=${f.tarjeta}`;

  const res = await fetch(url);
  state.facturas = await res.json();
  renderTablaFacturas(state.facturas);
}

function switchModalTab(tab) {

    t.classList.toggle('active', (i===0&&tab==='subir')||(i===1&&tab==='manual'));
  });

async function handleFiles(files) {
  if (!files.length) return;
  document.getElementById('upload-progress').style.display = '';
  let done = 0;
  for (const file of files) {
    const fd = new FormData();
    fd.append('archivo', file);
    fd.append('usuario_id', state.usuarioId);
    fd.append('tipo', uploadTipo);
    try {
      const res = await fetch('/api/facturas', { method: 'POST', body: fd });
      const data = await res.json();
      if (res.status === 409 && data.duplicado) {
        toast(`⚠ ${file.name} — DUPLICADO: ${data.mensaje}`, 'warn');
      } else if (res.ok) {
        toast(`✓ ${file.name} → ${data.tarjeta||'?'} — ${data.fuente_extraccion === 'ia' ? 'IA extrajo' : 'XML leído'}: ${data.nombre_emisor || data.folio}`, 'success');
      } else {
        toast(`✗ ${file.name}: ${data.error}`, 'error');
      }
    } catch(e) {
      toast(`✗ Error subiendo ${file.name}`, 'error');
    }
    done++;
    const pct = Math.round(done / files.length * 100);
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('upload-progress-pct').textContent = pct + '%';
  }
  setTimeout(() => {
    cerrarModal('modal-factura');
    document.getElementById('upload-progress').style.display = 'none';
    document.getElementById('progress-fill').style.width = '0%';
    if (state.page === 'facturas') cargarYRenderFacturas();
    if (state.page === 'dashboard') renderDashboard();
  }, 800);
}

function fmt(n) {

function badgeEstado(estado) {
  const map = { pendiente: 'badge-warn', pagada: 'badge-ok', cancelada: 'badge-danger' };
  return `<span class="badge ${map[estado]||'badge-info'}">${estado||'—'}</span>`;

  if (f.conciliada) return '<span class="badge badge-ok">Sí</span>';

async function subirEstadoCuenta(input) {
  const file = input.files[0];
  if (!file) return;
  const banco = document.getElementById('edo-banco').value || 'Banco';
  const mes = document.getElementById('edo-mes').value;
  const anio = document.getElementById('edo-anio').value;
  const resultEl = document.getElementById('edo-upload-result');
  resultEl.innerHTML = '<span class="spinner"></span> Subiendo...';
  const fd = new FormData();
  fd.append('archivo', file);
  fd.append('usuario_id', state.usuarioId);
  fd.append('banco', banco);
  fd.append('mes', mes);
  fd.append('anio', anio);
  try {
    const res = await fetch('/api/estados-cuenta/subir', { method: 'POST', body: fd });
    const data = await res.json();
    if (res.ok) {
      const driveMsg = data.drive?.ok ? ` · <span style="color:var(--accent)">✓ Drive: ${data.drive.nombre}</span>` : '';
      resultEl.innerHTML = `<span class="badge badge-ok">✓ ${file.name} subido${driveMsg}</span>`;
      toast(`✓ Estado de cuenta subido${data.drive?.ok ? ' y organizado en Drive' : ''}`, 'success');
    } else {
      resultEl.innerHTML = `<span class="badge badge-danger">✗ ${data.error}</span>`;
    }
  } catch(e) {
    resultEl.innerHTML = '<span class="badge badge-danger">✗ Error subiendo archivo</span>';
  }
  input.value = '';
}

            ${driveMsg}
            <button class="btn btn-secondary btn-sm" onclick="setPage('cierres')" style="font-size:11px;padding:4px 10px">Ver cierre del mes →</button>
            <button class="btn btn-secondary btn-sm" onclick="setPage('banco')" style="font-size:11px;padding:4px 10px">Ver movimientos →</button>
          </div>
        </div>
      `;
      toast(`✓ ${data.movimientos_guardados} movimientos de ${data.banco} — $${Number(data.total_cargos||0).toLocaleString('es-MX',{maximumFractionDigits:0})} total`, 'success');

// ─── VER FACTURA ─────────────────────────────────────────────────────────────
function verFactura(id, nombre, empresa, tipo) {
  const modal = document.getElementById('modal-factura-viewer');
  const body = document.getElementById('modal-factura-body');
  const titulo = document.getElementById('modal-factura-titulo');
  const sub = document.getElementById('modal-factura-sub');
  const dl = document.getElementById('modal-factura-download');
  const url = `/api/facturas/${id}/archivo`;
  titulo.textContent = empresa || nombre || `Factura #${id}`;
  sub.textContent = tipo === 'recibida' ? 'Factura recibida' : 'Factura emitida';
  dl.href = url;
  body.innerHTML = '';
  // Detectar tipo por extensión en nombre
  const ext = (nombre||'').split('.').pop().toLowerCase();
  if (['jpg','jpeg','png'].includes(ext)) {
    const img = document.createElement('img');
    img.src = url;
    img.style.maxWidth = '100%';
    img.style.maxHeight = '100%';
    img.style.objectFit = 'contain';
    img.style.padding = '16px';
    body.appendChild(img);
  } else if (ext === 'xml') {
    body.innerHTML = `<div style="padding:20px;color:var(--muted);text-align:center"><div style="font-size:40px;margin-bottom:12px">📄</div><div>Archivo XML — usa el botón Descargar para abrirlo</div></div>`;
  } else {
    const iframe = document.createElement('iframe');
    iframe.src = url;
    iframe.style.width = '100%';
    iframe.style.height = '100%';
    iframe.style.border = 'none';
    body.appendChild(iframe);
  }
  modal.classList.add('open');
}

function cerrarModalFactura() {
  document.getElementById('modal-factura-viewer').classList.remove('open');
  document.getElementById('modal-factura-body').innerHTML = '';
}

// Cerrar con ESC
document.addEventListener('keydown', e => { if(e.key==='Escape') cerrarModalFactura(); });

// ─── SORTING ─────────────────────────────────────────────────────────────────
function sortTable(table, colIndex, type='text') {
  const tbody = table.querySelector('tbody');
  if (!tbody) return;
  const rows = Array.from(tbody.querySelectorAll('tr'));
  const th = table.querySelectorAll('th')[colIndex];
  const asc = th.classList.contains('sort-desc') || !th.classList.contains('sort-asc');
  // Reset all
  table.querySelectorAll('th').forEach(t => t.classList.remove('sort-asc','sort-desc'));
  th.classList.add(asc ? 'sort-asc' : 'sort-desc');
  rows.sort((a, b) => {
    const av = a.cells[colIndex]?.textContent.trim() || '';
    const bv = b.cells[colIndex]?.textContent.trim() || '';
    if (type === 'num') {
      const an = parseFloat(av.replace(/[$,]/g,'')) || 0;
      const bn = parseFloat(bv.replace(/[$,]/g,'')) || 0;
      return asc ? an - bn : bn - an;
    }
    return asc ? av.localeCompare(bv,'es') : bv.localeCompare(av,'es');
  });
  rows.forEach(r => tbody.appendChild(r));
}

function makeSortable(tableId, cols) {
  // cols: [{index, type}]
  const table = document.getElementById(tableId);
  if (!table) return;
  cols.forEach(({index, type}) => {
    const th = table.querySelectorAll('th')[index];
    if (!th) return;
    th.classList.add('sortable');
    th.addEventListener('click', () => sortTable(table, index, type));
  });
}

// ─── TOOLTIP HELPER ──────────────────────────────────────────────────────────
let _tipEl = null;
function _initTooltips() {
  if (_tipEl) return;
  _tipEl = document.createElement('div');
  _tipEl.className = 'tooltip-box';
  _tipEl.style.display = 'none';
  document.body.appendChild(_tipEl);
  document.addEventListener('mousemove', e => {
    if (_tipEl.style.display === 'block') {
      let x = e.clientX + 12;
      let y = e.clientY - 40;
      if (x + 240 > window.innerWidth) x = e.clientX - 240;
      if (y < 0) y = e.clientY + 20;
      _tipEl.style.left = x + 'px';
      _tipEl.style.top = y + 'px';
    }
  });
}
function tooltip(text) {
  return `<span class="tooltip-icon" onmouseenter="_showTip(event,'${text.replace(/'/g,'&#39;')}')" onmouseleave="_hideTip()">ⓘ</span>`;
}
function _showTip(e, text) {
  _initTooltips();
  _tipEl.textContent = text;
  _tipEl.style.display = 'block';
  let x = e.clientX + 12;
  let y = e.clientY - 40;
  if (x + 240 > window.innerWidth) x = e.clientX - 240;
  if (y < 0) y = e.clientY + 20;
  _tipEl.style.left = x + 'px';
  _tipEl.style.top = y + 'px';
}
function _hideTip() {
  if (_tipEl) _tipEl.style.display = 'none';
}

// ─── UNIVERSAL TABLE SORT ────────────────────────────────────────────────────
function sortTableById(tableId, colIndex, type) {
  const table = document.getElementById(tableId);
  if (!table) return;
  const tbody = table.querySelector('tbody');
  if (!tbody) return;
  const rows = Array.from(tbody.querySelectorAll('tr'));
  const th = table.querySelectorAll('th')[colIndex];
  const asc = !th.classList.contains('sort-asc');
  table.querySelectorAll('th').forEach(t => t.classList.remove('sort-asc','sort-desc'));
  th.classList.add(asc ? 'sort-asc' : 'sort-desc');
  rows.sort((a,b) => {
    const av = a.cells[colIndex]?.textContent.trim()||'';
    const bv = b.cells[colIndex]?.textContent.trim()||'';
    if (type==='num') {
      return asc ? (parseFloat(av.replace(/[$,]/g,''))||0)-(parseFloat(bv.replace(/[$,]/g,''))||0)
                 : (parseFloat(bv.replace(/[$,]/g,''))||0)-(parseFloat(av.replace(/[$,]/g,''))||0);
    }
    return asc ? av.localeCompare(bv,'es') : bv.localeCompare(av,'es');
  });
  rows.forEach(r => tbody.appendChild(r));
}

// ─── RESET ───────────────────────────────────────────────────────────────────
async function resetearDatos() {
  const password = document.getElementById('reset-password').value;
  if (!password) { toast('Ingresa la contraseña', 'error'); return; }

  if (!confirm('¿Seguro que quieres borrar TODOS los datos? Esta acción no se puede deshacer.')) return;

  const resultEl = document.getElementById('reset-result');
  resultEl.innerHTML = '<span class="spinner"></span> Borrando...';

  try {
    const res = await fetch('/api/reset', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({password})
    });
    const data = await res.json();
    if (res.ok) {
      resultEl.innerHTML = '<span class="badge badge-ok">✓ ' + data.mensaje + '</span>';
      toast('✓ Todos los datos eliminados', 'success');
      document.getElementById('reset-password').value = '';
      setTimeout(() => setPage('dashboard'), 1500);
    } else {
      resultEl.innerHTML = '<span class="badge badge-danger">✗ ' + data.error + '</span>';
      toast('✗ ' + data.error, 'error');
    }
  } catch(e) {
    resultEl.innerHTML = '<span class="badge badge-danger">✗ Error de conexión</span>';
  }
}

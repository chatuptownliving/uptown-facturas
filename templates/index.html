<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uptown — Gestión de Facturas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #242424;
  --surface: #2e2e2e;
  --surface2: #393939;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.14);
  --text: #efefef;
  --muted: #a09080;
  --accent: #e18f00;
  --accent2: #f5a623;
  --danger: #f07070;
  --info: #85B7EB;
  --purple: #c4b89a;
  --font-head: 'Barlow Condensed', sans-serif;
  --font-body: 'Barlow', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --r: 8px;
  --r-lg: 14px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── LAYOUT ── */
.layout { display: flex; min-height: 100vh; }

.sidebar {
  width: 220px;
  min-width: 220px;
  background: #1e1e1e;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 0;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
}

.sidebar-logo {
  padding: 22px 20px 18px;
  border-bottom: 2px solid var(--accent);
}

.logo-mark {
  font-family: var(--font-head);
  font-size: 20px;
  font-weight: 800;
  color: var(--accent);
  letter-spacing: 0.06em;
  line-height: 1;
}

.logo-sub {
  font-size: 9px;
  color: var(--muted);
  font-family: var(--font-mono);
  letter-spacing: 0.1em;
  margin-top: 2px;
}

.sidebar-nav {
  flex: 1;
  padding: 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.nav-section {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.08em;
  padding: 12px 8px 6px;
  text-transform: uppercase;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: var(--r);
  cursor: pointer;
  font-size: 13.5px;
  color: var(--muted);
  transition: all 0.15s;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}

.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: rgba(225,143,0,0.12); color: var(--accent); border-left: 2px solid var(--accent); padding-left: 10px; }
.nav-item .icon { font-size: 16px; opacity: 0.8; }

.sidebar-footer {
  padding: 16px 12px;
  border-top: 1px solid var(--border);
}

.user-chip {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  background: var(--surface2);
  border-radius: var(--r);
}

.user-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, #e18f00, #f5a623);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-head);
  font-size: 11px;
  font-weight: 700;
  color: #1a0e00;
  flex-shrink: 0;
}

.user-name { font-size: 12.5px; font-weight: 500; }
.user-role { font-size: 10px; color: var(--muted); font-family: var(--font-mono); }

.main { margin-left: 220px; flex: 1; display: flex; flex-direction: column; }

.topbar {
  background: #1e1e1e;
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}

.page-title {
  font-family: var(--font-head);
  font-size: 22px;
  font-weight: 800;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.topbar-actions { display: flex; align-items: center; gap: 10px; }

.content { padding: 24px 28px; flex: 1; }

/* ── TABS ── */
.tabs {
  display: flex;
  gap: 2px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 3px;
  width: fit-content;
  margin-bottom: 24px;
}

.tab {
  padding: 7px 16px;
  border-radius: 8px;
  border: none;
  background: none;
  color: var(--muted);
  font-size: 13px;
  font-family: var(--font-body);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.tab.active { background: var(--surface2); color: var(--text); }
.tab:hover:not(.active) { color: var(--text); }

/* ── CARDS ── */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s;
}
.stat-card:hover { border-color: rgba(225,143,0,0.3); }

.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--accent-card, var(--accent));
  border-radius: 0;
}

.stat-label {
  font-size: 10px;
  color: var(--muted);
  font-family: var(--font-head);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 600;
  margin-bottom: 8px;
}

.stat-value {
  font-family: var(--font-head);
  font-size: 26px;
  font-weight: 800;
  line-height: 1;
  margin-bottom: 4px;
  letter-spacing: -0.01em;
}

.stat-sub {
  font-size: 11px;
  color: var(--muted);
}

/* ── BUTTONS ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 8px 16px;
  border-radius: var(--r);
  border: none;
  font-size: 13px;
  font-family: var(--font-body);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.btn-primary {
  background: var(--accent);
  color: #1a0e00;
  font-weight: 600;
  font-family: var(--font-head);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  font-size: 12px;
}
.btn-primary:hover { background: #f5a623; transform: translateY(-1px); }

.btn-secondary {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border2);
}
.btn-secondary:hover { background: var(--surface); border-color: var(--accent); color: var(--accent); }

.btn-ghost {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
}
.btn-ghost:hover { color: var(--text); border-color: var(--border2); }

.btn-danger {
  background: rgba(240,149,149,0.1);
  color: var(--danger);
  border: 1px solid rgba(240,149,149,0.2);
}
.btn-danger:hover { background: rgba(240,149,149,0.2); }

.btn-sm { padding: 5px 11px; font-size: 12px; }
.btn-icon { padding: 7px; border-radius: 8px; }

/* ── TABLE ── */
.table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
}

.table-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  gap: 12px;
}

.table-header-left { display: flex; align-items: center; gap: 12px; flex: 1; }

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  padding: 11px 14px;
  text-align: left;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
  white-space: nowrap;
}

td {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  vertical-align: middle;
}

tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.015); }

.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 9px;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 500;
  font-family: var(--font-mono);
  white-space: nowrap;
}

.badge-ok { background: rgba(225,143,0,0.12); color: #e18f00; border: 1px solid rgba(225,143,0,0.25); }
.badge-warn { background: rgba(239,159,39,0.12); color: #EF9F27; border: 1px solid rgba(239,159,39,0.2); }
.badge-danger { background: rgba(240,149,149,0.12); color: #F09595; border: 1px solid rgba(240,149,149,0.2); }
.badge-info { background: rgba(133,183,235,0.12); color: #85B7EB; border: 1px solid rgba(133,183,235,0.2); }
.badge-purple { background: rgba(175,169,236,0.12); color: #AFA9EC; border: 1px solid rgba(175,169,236,0.2); }

/* ── SEARCH & FILTERS ── */
.search-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 0 12px;
  flex: 1;
  max-width: 360px;
  transition: border-color 0.15s;
}

.search-bar:focus-within { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(225,143,0,0.15); }

.search-bar input {
  border: none;
  background: none;
  color: var(--text);
  font-size: 13px;
  font-family: var(--font-body);
  padding: 9px 4px;
  flex: 1;
  outline: none;
}

.search-bar input::placeholder { color: var(--muted); }

.filters {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}

select, .select {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  color: var(--text);
  font-size: 13px;
  font-family: var(--font-body);
  padding: 7px 10px;
  outline: none;
  cursor: pointer;
  transition: border-color 0.15s;
}

select:focus { border-color: var(--accent); }

/* ── UPLOAD ZONE ── */
.upload-zone {
  border: 1.5px dashed var(--border2);
  border-radius: var(--r-lg);
  padding: 32px;
  text-align: center;
  background: var(--surface);
  cursor: pointer;
  transition: all 0.2s;
}

.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--accent);
  background: rgba(225,143,0,0.05);
}

.upload-icon {
  font-size: 36px;
  margin-bottom: 10px;
  opacity: 0.5;
}

.upload-title { font-family: var(--font-head); font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.upload-sub { color: var(--muted); font-size: 12px; }

/* ── MODAL ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r-lg);
  padding: 28px;
  width: 580px;
  max-width: 95vw;
  max-height: 90vh;
  overflow-y: auto;
  transform: translateY(16px);
  transition: transform 0.2s;
}

.modal-overlay.open .modal { transform: translateY(0); }

.modal-title {
  font-family: var(--font-head);
  font-size: 17px;
  font-weight: 600;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-full { grid-column: 1/-1; }

.form-group { display: flex; flex-direction: column; gap: 5px; }

.form-label {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
}

.form-input {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  color: var(--text);
  font-size: 13px;
  font-family: var(--font-body);
  padding: 9px 12px;
  outline: none;
  transition: border-color 0.15s;
  width: 100%;
}

.form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(225,143,0,0.15); }

/* ── NOTIFICATIONS ── */
.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 2000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  padding: 12px 16px;
  font-size: 13px;
  min-width: 260px;
  display: flex;
  align-items: center;
  gap: 10px;
  animation: slideUp 0.2s ease;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}

.toast.success { border-left: 3px solid #e18f00; }
.toast.error { border-left: 3px solid var(--danger); }
.toast.info { border-left: 3px solid var(--info); }
.toast.warn { border-left: 3px solid var(--accent2); }

@keyframes slideUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── PROGRESS ── */
.progress-bar {
  height: 3px;
  background: var(--border);
  border-radius: 99px;
  overflow: hidden;
  margin-top: 8px;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #e18f00, #f5a623);
  border-radius: 99px;
  transition: width 0.3s ease;
}

/* ── CONCILIACION DIFF ── */
.diff-pos { color: var(--accent); }
.diff-neg { color: var(--danger); }
.diff-zero { color: var(--muted); }

.empty-state {
  text-align: center;
  padding: 60px 24px;
  color: var(--muted);
}

.empty-state .empty-icon {
  font-size: 40px;
  margin-bottom: 12px;
  opacity: 0.3;
}

.empty-state p { font-size: 14px; }

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.section-title {
  font-family: var(--font-head);
  font-size: 17px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

.text-mono { font-family: var(--font-mono); }
.text-muted { color: var(--muted); }
.text-sm { font-size: 12px; }
.text-xs { font-size: 11px; }

.loading-row td {
  text-align: center;
  padding: 40px;
  color: var(--muted);
}

.spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid var(--border2);
  border-top-color: #e18f00;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.tag {
  display: inline-flex;
  align-items: center;
  padding: 2px 7px;
  border-radius: 5px;
  font-size: 10px;
  font-family: var(--font-mono);
  background: var(--surface2);
  color: var(--muted);
  border: 1px solid var(--border);
}
</style>
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
        <svg width="32" height="36" viewBox="0 0 160 180" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Left thin column -->
          <rect x="8" y="60" width="28" height="90" rx="6" fill="#e18f00"/>
          <!-- Inner small column (middle notch detail) -->
          <rect x="48" y="80" width="20" height="70" rx="5" fill="#e18f00"/>
          <!-- Right large column with rounded top cap -->
          <path d="M86 20 Q86 8 100 8 L136 8 Q150 8 150 22 L150 148 Q150 156 142 156 L94 156 Q86 156 86 148 Z" fill="#e18f00"/>
          <!-- Bottom bridge connecting left to right -->
          <rect x="8" y="130" width="142" height="30" rx="8" fill="#e18f00"/>
          <!-- Cutout to create inner U space -->
          <rect x="36" y="60" width="50" height="72" fill="#1e1e1e"/>
        </svg>
        <div>
          <div class="logo-mark">UPTOWN</div>
          <div class="logo-sub">· Facturas</div>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Principal</div>
      <button class="nav-item active" onclick="setPage('dashboard')">
        <span class="icon">◈</span> Dashboard
      </button>
      <button class="nav-item" onclick="setPage('facturas')">
        <span class="icon">◧</span> Facturas
      </button>
      <button class="nav-item" onclick="setPage('banco')">
        <span class="icon">◫</span> Estado de cuenta
      </button>
      <div class="nav-section">Análisis</div>
      <button class="nav-item" onclick="setPage('conciliacion')">
        <span class="icon">⇄</span> Conciliación
      </button>
      <button class="nav-item" onclick="setPage('msi')">
        <span class="icon">◑</span> MSI
      </button>
      <button class="nav-item" onclick="setPage('reportes')">
        <span class="icon">◉</span> Reportes
      </button>
    </nav>
    <div style="padding:0 12px 8px;font-family:var(--font-head);font-size:9px;letter-spacing:0.15em;color:rgba(225,143,0,0.4);text-transform:uppercase;text-align:center">The next generation of builders.</div>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar" id="user-avatar">AD</div>
        <div>
          <div class="user-name" id="user-name-display">Admin</div>
          <div class="user-role">Equipo</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:14px">
        <svg width="22" height="24" viewBox="0 0 160 180" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="8" y="60" width="28" height="90" rx="6" fill="#e18f00"/>
          <rect x="48" y="80" width="20" height="70" rx="5" fill="#e18f00"/>
          <path d="M86 20 Q86 8 100 8 L136 8 Q150 8 150 22 L150 148 Q150 156 142 156 L94 156 Q86 156 86 148 Z" fill="#e18f00"/>
          <rect x="8" y="130" width="142" height="30" rx="8" fill="#e18f00"/>
          <rect x="36" y="60" width="50" height="72" fill="#393939"/>
        </svg>
        <div class="page-title" id="page-title">Dashboard</div>
      </div>
      <div class="topbar-actions">
        <select id="usuario-select" onchange="cambiarUsuario(this.value)" style="max-width:160px">
        </select>
        <span id="drive-status" style="font-size:11px;font-family:var(--font-mono);color:var(--muted)"></span>
        <button class="btn btn-primary btn-sm" onclick="abrirModalFactura()">
          + Nueva factura
        </button>
      </div>
    </header>

    <div class="content" id="content">
      <!-- Contenido dinámico -->
    </div>
  </main>

</div>

<!-- ── MODAL FACTURA ── -->
<div class="modal-overlay" id="modal-factura">
  <div class="modal">
    <div class="modal-title">
      <span>Agregar factura</span>
      <button class="btn btn-ghost btn-icon btn-sm" onclick="cerrarModal('modal-factura')">✕</button>
    </div>

    <!-- TABS MODAL -->
    <div class="tabs" style="margin-bottom:20px">
      <button class="tab active" onclick="switchModalTab('subir')">Subir archivo</button>
      <button class="tab" onclick="switchModalTab('manual')">Manual</button>
    </div>

    <!-- Subir archivo -->
    <div id="modal-tab-subir">
      <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <div class="upload-icon">⬆</div>
        <div class="upload-title">Arrastra o selecciona archivos</div>
        <div class="upload-sub">XML · PDF · JPG · PNG — Extracción automática con IA</div>
        <input type="file" id="file-input" accept=".xml,.pdf,.jpg,.jpeg,.png" multiple style="display:none" onchange="handleFiles(this.files)">
      </div>
      <div id="upload-progress" style="margin-top:16px;display:none">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span class="text-sm text-muted">Procesando con IA...</span>
          <span class="text-sm text-mono" id="upload-progress-pct">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
      </div>
      <div style="margin-top:14px">
        <label class="form-label">Tipo de factura</label>
        <div style="display:flex;gap:8px;margin-top:6px">
          <button class="btn btn-secondary btn-sm tipo-btn active" data-tipo="emitida" onclick="selectTipo('emitida',this)">Emitida (cobrar)</button>

<!-- TOASTS -->
<div class="toast-container" id="toast-container"></div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────
let state = {
  page: 'dashboard',
  usuarioId: 1,
  usuarioNombre: 'Admin',
  tipoFactura: 'emitida',
  facturas: [],
  movimientos: [],
  resumen: {},
  filtros: { q: '', tipo: '', mes: '', anio: '', estado: '', conciliada: '' }
};

const MESES = ['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

// ─── INIT ─────────────────────────────────────────────────────────────────
async function init() {
  await cargarUsuarios();
  setPage('dashboard');
}

async function cargarUsuarios() {
  const res = await fetch('/api/usuarios');
  const usuarios = await res.json();
  const sel = document.getElementById('usuario-select');
  sel.innerHTML = usuarios.map(u => `<option value="${u.id}">${u.nombre}</option>`).join('');
  if (usuarios.length) {
    state.usuarioId = usuarios[0].id;
    state.usuarioNombre = usuarios[0].nombre;
    document.getElementById('user-name-display').textContent = usuarios[0].nombre;
    document.getElementById('user-avatar').textContent = usuarios[0].nombre.slice(0,2).toUpperCase();
  }
}

function cambiarUsuario(id) {
  state.usuarioId = parseInt(id);
  const sel = document.getElementById('usuario-select');
  const opt = sel.options[sel.selectedIndex];
  document.getElementById('user-name-display').textContent = opt.text;
  document.getElementById('user-avatar').textContent = opt.text.slice(0,2).toUpperCase();
  renderPage();
}

// ─── ROUTING ──────────────────────────────────────────────────────────────
function setPage(page) {
  state.page = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const idx = ['dashboard','facturas','banco','conciliacion','msi','reportes'].indexOf(page);
  document.querySelectorAll('.nav-item')[idx]?.classList.add('active');
  const titles = { dashboard: 'Dashboard', facturas: 'Facturas', banco: 'Estado de Cuenta', conciliacion: 'Conciliación', msi: 'Compras a Meses', reportes: 'Reportes' };
  document.getElementById('page-title').textContent = titles[page] || page;
  renderPage();
}

async function renderPage() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="empty-state"><span class="spinner"></span></div>';
  switch(state.page) {
    case 'dashboard': await renderDashboard(); break;
    case 'facturas': await renderFacturas(); break;
    case 'banco': await renderBanco(); break;
    case 'conciliacion': await renderConciliacion(); break;
    case 'msi': await renderMSI(); break;
    case 'reportes': await renderReportes(); break;
  }
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────
async function renderDashboard() {
  const res = await fetch(`/api/conciliacion/resumen?usuario_id=${state.usuarioId}`);
  const r = await res.json();
  const content = document.getElementById('content');

  // Fetch banco and MSI data in parallel
  const [resBanco, resMSI] = await Promise.all([
    fetch(`/api/movimientos?usuario_id=${state.usuarioId}`),
    fetch(`/api/msi/resumen?usuario_id=${state.usuarioId}`)
  ]);
  const movimientos = await resBanco.json();
  const msiResumen = await resMSI.json();

  const totalAbonos = movimientos.filter(m=>m.tipo==='abono').reduce((s,m)=>s+m.monto,0);
  const totalCargos = movimientos.filter(m=>m.tipo==='cargo').reduce((s,m)=>s+m.monto,0);
  const movRecientes = movimientos.slice(0,5);

  content.innerHTML = `
    <!-- FACTURAS -->
    <div style="margin-bottom:6px;font-family:var(--font-head);font-size:11px;letter-spacing:0.1em;color:var(--muted);text-transform:uppercase">Facturas</div>
    <div class="cards-grid" style="margin-bottom:20px">
      <div class="stat-card" style="--accent-card:var(--accent)">
        <div class="stat-label">Total facturas</div>
        <div class="stat-value">${r.total_facturas || 0}</div>
        <div class="stat-sub">${r.emitidas||0} emitidas · ${r.recibidas||0} recibidas</div>
      </div>
      <div class="stat-card" style="--accent-card:var(--accent2)">
        <div class="stat-label">Por cobrar</div>
        <div class="stat-value" style="color:var(--accent2)">${fmt(r.por_cobrar||0)}</div>
        <div class="stat-sub">${Math.max(0,(r.emitidas||0)-(r.conciliadas||0))} facturas pendientes</div>
      </div>
      <div class="stat-card" style="--accent-card:var(--danger)">
        <div class="stat-label">Por pagar</div>
        <div class="stat-value" style="color:var(--danger)">${fmt(r.por_pagar||0)}</div>
        <div class="stat-sub">${r.pendientes||0} facturas pendientes</div>
      </div>
      <div class="stat-card" style="--accent-card:${(r.balance||0)>=0?'var(--accent)':'var(--danger)'}">
        <div class="stat-label">Balance neto</div>
        <div class="stat-value" style="color:${(r.balance||0) >= 0 ? 'var(--accent)' : 'var(--danger)'}">${fmt(r.balance||0)}</div>
        <div class="stat-sub">Emitido − Recibido</div>
      </div>
    </div>

    <!-- ESTADO DE CUENTA -->
    <div style="margin-bottom:6px;font-family:var(--font-head);font-size:11px;letter-spacing:0.1em;color:var(--muted);text-transform:uppercase">Estado de cuenta</div>
    <div class="cards-grid" style="margin-bottom:20px">
      <div class="stat-card" style="--accent-card:var(--accent)">
        <div class="stat-label">Movimientos registrados</div>
        <div class="stat-value">${movimientos.length}</div>
        <div class="stat-sub">${movimientos.filter(m=>m.tipo==='abono').length} abonos · ${movimientos.filter(m=>m.tipo==='cargo').length} cargos</div>
      </div>
      <div class="stat-card" style="--accent-card:var(--danger)">
        <div class="stat-label">Total gastado</div>
        <div class="stat-value" style="color:var(--danger)">${fmt(totalCargos)}</div>
        <div class="stat-sub">Cargos del periodo</div>
      </div>
      <div class="stat-card" style="--accent-card:var(--accent)">
        <div class="stat-label">Conciliados</div>
        <div class="stat-value">${movimientos.filter(m=>m.conciliado).length}</div>
        <div class="stat-sub">de ${movimientos.length} movimientos</div>
      </div>
    </div>

    <!-- MSI -->
    ${msiResumen.compras_activas > 0 ? `
    <div style="margin-bottom:6px;font-family:var(--font-head);font-size:11px;letter-spacing:0.1em;color:var(--muted);text-transform:uppercase">Meses sin intereses</div>
    <div class="cards-grid" style="margin-bottom:20px">
      <div class="stat-card" style="--accent-card:var(--accent2)">
        <div class="stat-label">Compras activas MSI</div>
        <div class="stat-value">${msiResumen.compras_activas}</div>
        <div class="stat-sub">A meses sin intereses</div>
      </div>
      <div class="stat-card" style="--accent-card:var(--danger)">
        <div class="stat-label">Deuda total MSI</div>
        <div class="stat-value" style="color:var(--danger)">${fmt(msiResumen.total_deuda_msi||0)}</div>
        <div class="stat-sub">Saldo pendiente</div>
      </div>
      <div class="stat-card" style="--accent-card:var(--accent2)">
        <div class="stat-label">Pago mensual MSI</div>
        <div class="stat-value" style="color:var(--accent2)">${fmt(msiResumen.pago_mensual_msi||0)}</div>
        <div class="stat-sub">Se cobra este mes</div>
      </div>
    </div>` : ''}

    <!-- GRID INFERIOR -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div>
        <div class="section-header"><span class="section-title">Facturas recientes</span><button class="btn btn-ghost btn-sm" onclick="setPage('facturas')">Ver todas →</button></div>
        <div id="dash-facturas-recientes"></div>
      </div>
      <div>
        <div class="section-header"><span class="section-title">Movimientos recientes</span><button class="btn btn-ghost btn-sm" onclick="setPage('banco')">Ver todos →</button></div>
        ${movRecientes.length === 0 ? '<div class="empty-state" style="padding:30px"><p>Sin movimientos aún</p></div>' : `
        <div class="table-wrap">
          <table>
            <thead><tr><th>Fecha</th><th>Descripción</th><th>Tipo</th><th>Monto</th></tr></thead>
            <tbody>
              ${movRecientes.map(m=>`
                <tr>
                  <td class="text-sm text-muted">${m.fecha||'—'}</td>
                  <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px">${m.descripcion||'—'}</td>
                  <td>${m.tipo==='abono'?'<span class="badge badge-ok">Abono</span>':'<span class="badge badge-danger">Cargo</span>'}</td>
                  <td class="text-mono" style="color:${m.tipo==='abono'?'var(--accent)':'var(--danger)'};">${fmt(m.monto)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>`}
      </div>
    </div>
  `;

  const fRes = await fetch(`/api/facturas?usuario_id=${state.usuarioId}`);
  const facturas = (await fRes.json()).slice(0,6);
  document.getElementById('dash-facturas-recientes').innerHTML = renderTablaFacturasMini(facturas);
}

function renderTablaFacturasMini(facturas) {
  if (!facturas.length) return '<div class="empty-state" style="padding:30px"><p>Sin facturas aún</p></div>';
  return `
    <div class="table-wrap">
      <table>
        <thead><tr><th>Folio</th><th>Empresa</th><th>Total</th><th>Estado</th></tr></thead>
        <tbody>
          ${facturas.map(f => `
            <tr>
              <td class="text-mono text-sm">${f.folio || '—'}</td>
              <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.tipo==='emitida'?(f.nombre_receptor||'—'):(f.nombre_emisor||'—')}</td>
              <td class="text-mono">${fmt(f.total)}</td>
              <td>${badgeConciliada(f)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

// ─── FACTURAS ─────────────────────────────────────────────────────────────
async function renderFacturas() {
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="table-wrap">
      <div class="table-header">
        <div class="table-header-left">
          <div class="search-bar">
            <span style="color:var(--muted);font-size:16px">⌕</span>
            <input type="text" placeholder="Buscar por folio, empresa, RFC, concepto..." id="search-input" oninput="debounceSearch(this.value)">
          </div>
          <div class="filters">
            <select onchange="filtrar('tipo',this.value)">
              <option value="">Todas</option>
              <option value="emitida">Emitidas</option>
              <option value="recibida">Recibidas</option>
            </select>
            <select onchange="filtrar('mes',this.value)">
              <option value="">Todos los meses</option>
              ${MESES.slice(1).map((m,i)=>`<option value="${i+1}">${m}</option>`).join('')}
            </select>
            <select onchange="filtrar('anio',this.value)">
              <option value="">Todos los años</option>
              <option value="2025">2025</option>
              <option value="2024">2024</option>
            </select>
            <select onchange="filtrar('estado',this.value)">
              <option value="">Todos los estados</option>
              <option value="pendiente">Pendiente</option>
              <option value="pagada">Pagada</option>
              <option value="cancelada">Cancelada</option>
            </select>
          </div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="abrirModalFactura()">+ Agregar</button>
      </div>
      <div id="facturas-tabla-body"></div>
    </div>
  `;
  await cargarYRenderFacturas();
}

async function cargarYRenderFacturas() {
  const f = state.filtros;
  let url = `/api/facturas?usuario_id=${state.usuarioId}`;
  if (f.q) url += `&q=${encodeURIComponent(f.q)}`;
  if (f.tipo) url += `&tipo=${f.tipo}`;
  if (f.mes) url += `&mes=${f.mes}`;
  if (f.anio) url += `&anio=${f.anio}`;
  if (f.estado) url += `&estado=${f.estado}`;

  const res = await fetch(url);
  state.facturas = await res.json();
  renderTablaFacturas(state.facturas);
}

function renderTablaFacturas(facturas) {
  const el = document.getElementById('facturas-tabla-body');
  if (!el) return;
  if (!facturas.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">◧</div><p>No se encontraron facturas</p></div>';
    return;
  }
  el.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Folio</th><th>Fecha</th><th>Tipo</th><th>Empresa</th>
          <th>RFC</th><th>Concepto</th><th>Subtotal</th><th>IVA</th>
          <th>Total</th><th>Estado</th><th>Conciliada</th><th></th>
        </tr>
      </thead>
      <tbody>
        ${facturas.map(f => `
          <tr>
            <td class="text-mono text-sm">${f.folio || '—'}</td>
            <td class="text-sm text-muted">${f.fecha_emision ? f.fecha_emision.slice(0,10) : '—'}</td>
            <td>${f.tipo === 'emitida' ? '<span class="badge badge-ok">Emitida</span>' : '<span class="badge badge-purple">Recibida</span>'}</td>
            <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12.5px">
              ${f.tipo==='emitida'?(f.nombre_receptor||'—'):(f.nombre_emisor||'—')}
            </td>
            <td class="text-mono text-xs text-muted">${f.tipo==='emitida'?(f.rfc_receptor||'—'):(f.rfc_emisor||'—')}</td>
            <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;color:var(--muted)">${f.concepto||'—'}</td>
            <td class="text-mono text-sm">${fmt(f.subtotal)}</td>
            <td class="text-mono text-sm">${fmt(f.iva)}</td>
            <td class="text-mono" style="font-weight:500">${fmt(f.total)}</td>
            <td>${badgeEstado(f.estado_pago)}</td>
            <td>${badgeConciliada(f)}</td>
            <td>
              <button class="btn btn-ghost btn-icon btn-sm" title="Eliminar" onclick="eliminarFactura(${f.id})">✕</button>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

// ─── BANCO ────────────────────────────────────────────────────────────────
async function renderBanco() {
  const content = document.getElementById('content');
  content.innerHTML = `
    <!-- SUBIR ESTADO DE CUENTA -->
    <div class="table-wrap" style="padding:24px;margin-bottom:20px">
      <div class="section-title" style="margin-bottom:4px">Estado de Cuenta</div>
      <div class="text-sm text-muted" style="margin-bottom:20px">Sube el PDF o foto de tu estado de cuenta — la IA lee todos los movimientos y los registra automáticamente</div>

      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px">
        <div class="form-group">
          <label class="form-label">Banco</label>
          <input class="form-input" id="ia-banco" placeholder="Ej. BBVA, Banamex, HSBC">

          </select>
        </div>
      </div>

      <div class="upload-zone" onclick="document.getElementById('ia-edo-file').click()">

        <input type="file" id="ia-edo-file" accept=".pdf,.jpg,.jpeg,.png" style="display:none" onchange="analizarEstadoCuentaIA(this)">

      <div id="ia-resultado" style="margin-top:14px"></div>

      <hr style="margin:20px 0">

      <div class="section-title" style="font-size:13px;margin-bottom:8px">¿Tienes CSV del banco?</div>

      </label>

    </div>

    <div class="table-wrap">
      <div class="table-header">
        <div class="table-header-left">
          <span class="section-title" style="font-size:14px">Movimientos registrados</span>
          <div class="filters">
            <select onchange="filtrarBanco('mes',this.value)">
              <option value="">Todos los meses</option>
              ${MESES.slice(1).map((m,i)=>`<option value="${i+1}">${m}</option>`).join('')}
            </select>
            <select onchange="filtrarBanco('anio',this.value)">
              <option value="">Todos los años</option>
              <option value="2026">2026</option>
              <option value="2025">2025</option>
              <option value="2024">2024</option>
            </select>
          </div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="document.getElementById('modal-movimiento').classList.add('open')">+ Agregar manual</button>
      </div>
      <div id="banco-tabla-body"><div class="empty-state"><span class="spinner"></span></div></div>
    </div>
  `;
  await cargarYRenderBanco();
}

async function cargarYRenderBanco() {
  let url = `/api/movimientos?usuario_id=${state.usuarioId}`;
  if (state.filtros.mes) url += `&mes=${state.filtros.mes}`;

let uploadTipo = 'emitida';
let searchTimeout = null;

function abrirModalFactura() {

function selectTipo(tipo, btn) {
  uploadTipo = tipo;

  });

function switchModalTab(tab) {
  document.getElementById('modal-tab-subir').style.display = tab === 'subir' ? '' : 'none';
  document.getElementById('modal-tab-manual').style.display = tab === 'manual' ? '' : 'none';
  document.querySelectorAll('#modal-factura .tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0&&tab==='subir')||(i===1&&tab==='manual'));
  });
}

async function handleFiles(files) {
  if (!files.length) return;
  document.getElementById('upload-progress').style.display = '';
  let done = 0;
  for (const file of files) {
    const fd = new FormData();
    fd.append('archivo', file);
    fd.append('usuario_id', state.usuarioId);
    fd.append('tipo', uploadTipo);
    try {
      const res = await fetch('/api/facturas', { method: 'POST', body: fd });
      const data = await res.json();
      if (res.status === 409 && data.duplicado) {
        toast(`⚠ ${file.name} — DUPLICADO: ${data.mensaje}`, 'warn');
      } else if (res.ok) {
        toast(`✓ ${file.name} — ${data.fuente_extraccion === 'ia' ? 'IA extrajo' : 'XML leído'}: ${data.nombre_emisor || data.folio}`, 'success');
      } else {
        toast(`✗ ${file.name}: ${data.error}`, 'error');
      }
    } catch(e) {
      toast(`✗ Error subiendo ${file.name}`, 'error');
    }
    done++;
    const pct = Math.round(done / files.length * 100);
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('upload-progress-pct').textContent = pct + '%';
  }
  setTimeout(() => {
    cerrarModal('modal-factura');
    document.getElementById('upload-progress').style.display = 'none';
    document.getElementById('progress-fill').style.width = '0%';
    if (state.page === 'facturas') cargarYRenderFacturas();
    if (state.page === 'dashboard') renderDashboard();
  }, 800);
}

function fmt(n) {

  const map = { pendiente: 'badge-warn', pagada: 'badge-ok', cancelada: 'badge-danger' };

async function subirEstadoCuenta(input) {
  const file = input.files[0];
  if (!file) return;
  const banco = document.getElementById('edo-banco').value || 'Banco';
  const mes = document.getElementById('edo-mes').value;
  const anio = document.getElementById('edo-anio').value;
  const resultEl = document.getElementById('edo-upload-result');
  resultEl.innerHTML = '<span class="spinner"></span> Subiendo...';
  const fd = new FormData();
  fd.append('archivo', file);
  fd.append('usuario_id', state.usuarioId);
  fd.append('banco', banco);
  fd.append('mes', mes);
  fd.append('anio', anio);
  try {
    const res = await fetch('/api/estados-cuenta/subir', { method: 'POST', body: fd });
    const data = await res.json();
    if (res.ok) {
      const driveMsg = data.drive?.ok ? ` · <span style="color:var(--accent)">✓ Drive: ${data.drive.nombre}</span>` : '';
      resultEl.innerHTML = `<span class="badge badge-ok">✓ ${file.name} subido${driveMsg}</span>`;

      resultEl.innerHTML = `<span class="badge badge-danger">✗ ${data.error}</span>`;
    }
  } catch(e) {
    resultEl.innerHTML = '<span class="badge badge-danger">✗ Error subiendo archivo</span>';
  }
  input.value = '';
}

    }
  } catch(e) {
    resultEl.innerHTML = '<span class="badge badge-danger">✗ Error de conexión</span>';
  }
  input.value = '';
}

// ─── DRIVE ───────────────────────────────────────────────────────────────
async function checkDriveStatus() {
  try {
    const res = await fetch('/api/drive/status');
    const data = await res.json();
    const el = document.getElementById('drive-status');
    if (el) el.textContent = data.conectado ? '● Drive conectado' : '';
    if (el && data.conectado) el.style.color = '#e18f00';
    const info = document.getElementById('drive-info');
    if (info) info.innerHTML = data.conectado
      ? '<span class="badge badge-ok">Drive conectado</span>'
      : '<span class="badge badge-warn">Drive no configurado — agrega GOOGLE_CREDENTIALS en Railway</span>';
  } catch(e) {}
}

async function organizarDrive() {
  toast('Organizando facturas en Drive...', 'info');
  const res = await fetch('/api/drive/organizar', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({usuario_id: state.usuarioId})
  });
  const data = await res.json();
  if (res.ok) {
    toast('✓ ' + data.organizadas + ' facturas organizadas en Drive', 'success');
  } else {
    toast('Drive: ' + data.error, 'error');
  }
}

// ─── MSI PAGE ────────────────────────────────────────────────────────────────
async function renderMSI() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="empty-state"><span class="spinner"></span></div>';

  const [resMSI, resResumen] = await Promise.all([
    fetch(`/api/msi?usuario_id=${state.usuarioId}`),
    fetch(`/api/msi/resumen?usuario_id=${state.usuarioId}`)
  ]);
  const compras = await resMSI.json();
  const resumen = await resResumen.json();

  const totalMensualidades = resumen.pago_mensual_msi || 0;
  const totalDeuda = resumen.total_deuda_msi || 0;

  content.innerHTML = `
    <div style="margin-bottom:6px;font-family:var(--font-head);font-size:11px;letter-spacing:0.1em;color:var(--muted);text-transform:uppercase">Resumen MSI</div>
    <div class="cards-grid" style="margin-bottom:24px">
      <div class="stat-card" style="--accent-card:var(--accent)">
        <div class="stat-label">Compras activas</div>
        <div class="stat-value">${resumen.compras_activas || 0}</div>
        <div class="stat-sub">A meses sin intereses</div>
      </div>
      <div class="stat-card" style="--accent-card:var(--danger)">
        <div class="stat-label">Deuda total</div>
        <div class="stat-value" style="color:var(--danger)">${fmt(totalDeuda)}</div>
        <div class="stat-sub">Saldo pendiente acumulado</div>
      </div>
      <div class="stat-card" style="--accent-card:var(--accent2)">
        <div class="stat-label">Se cobra este mes</div>
        <div class="stat-value" style="color:var(--accent2)">${fmt(totalMensualidades)}</div>
        <div class="stat-sub">Suma de todas las mensualidades</div>
      </div>
    </div>

    ${compras.length === 0 ? `
      <div class="empty-state">
        <div class="empty-icon">◑</div>
        <p>Sin compras MSI registradas</p>
        <div class="text-sm text-muted" style="margin-top:8px">Sube un estado de cuenta con tabla de Meses Sin Intereses para verlas aquí</div>
      </div>` : `
    <div class="table-wrap">
      <div class="table-header">
        <span class="section-title" style="font-size:14px">Detalle por compra</span>
        <span class="text-sm text-muted">Cada fila = una compra a meses detectada en tu estado de cuenta</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Descripción</th>
            <th>Banco</th>
            <th>Compra original</th>
            <th>Mensualidad</th>
            <th>Progreso de pago</th>
            <th>Saldo pendiente</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody>
          ${compras.map(c => {
            const alDia = c.meses_restantes > 0;
            const casiFin = c.meses_restantes <= 2 && c.meses_restantes > 0;
            return `
            <tr>
              <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500">${c.descripcion}</td>
              <td class="text-sm text-muted">${c.banco || '—'}</td>
              <td class="text-mono">${fmt(c.monto_original)}</td>
              <td class="text-mono" style="color:var(--accent2);font-weight:500">${fmt(c.mensualidad)}<span class="text-xs text-muted">/mes</span></td>
              <td style="min-width:160px">
                <div style="display:flex;align-items:center;gap:8px">
                  <div style="flex:1;height:8px;background:var(--surface2);border-radius:99px;overflow:hidden">
                    <div style="height:100%;width:${c.porcentaje_pagado}%;background:${casiFin?'var(--accent2)':'var(--accent)'};border-radius:99px;transition:width 0.3s"></div>
                  </div>
                  <span class="text-xs text-muted" style="white-space:nowrap">${c.meses_pagados}/${c.meses_total} meses</span>
                </div>
                <div class="text-xs text-muted" style="margin-top:2px">${c.porcentaje_pagado}% pagado</div>
              </td>
              <td class="text-mono" style="color:var(--danger);font-weight:500">${fmt(c.saldo_pendiente)}</td>
              <td>
                ${c.meses_restantes === 0
                  ? '<span class="badge badge-ok">Liquidada</span>'
                  : casiFin
                  ? `<span class="badge badge-warn">Último${c.meses_restantes>1?'s':''} ${c.meses_restantes} mes${c.meses_restantes>1?'es':''}</span>`
                  : `<span class="badge badge-info">${c.meses_restantes} restantes</span>`}
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
      <div style="padding:12px 20px;background:var(--surface2);border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:12px">
        <span class="text-muted">Total mensual comprometido:</span>
        <span class="text-mono" style="color:var(--accent2);font-weight:600">${fmt(totalMensualidades)}</span>
      </div>
    </div>`}
  `;
}

// INIT
init();
checkDriveStatus();
</script>
</body>
</html>
